name: Deploy to Azure

on:
  push:
    branches: [main]

env:
  REGISTRY: acrmangrove.azurecr.io
  IMAGE_NAME: mps-studio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          TAG=${{ github.sha }}
          docker build -t $REGISTRY/$IMAGE_NAME:$TAG -t $REGISTRY/$IMAGE_NAME:latest .
          docker push $REGISTRY/$IMAGE_NAME:$TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name mps-studio \
            --resource-group rg-mangrove-mps \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "MANGROVE_DB_HOST=pg-mangrove-n8n.postgres.database.azure.com" \
              "MANGROVE_DB_PORT=5432" \
              "MANGROVE_DB_NAME=mangrove_workbench" \
              "MANGROVE_DB_USER=n8nadmin" \
              "MANGROVE_DB_PASSWORD=secretref:mangrove-db-password" \
              "STUDIO_TOKEN=secretref:studio-token" \
              "NOVELMAP_PORT=3001" \
              "NODE_ENV=production"
